<section class="projects">
<h1>The Weather APP</h1>
<div class="project-grid">
<div id="weather-app" style="max-width:350px;padding:20px;border-radius:12px;background:#f5f5f5;font-family:Arial;">
  <h3 style="margin-top:0;">🌤️ Weather App</h3>

  <input id="city-input" 
         type="text" 
         placeholder="Enter city..."
         style="width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;margin-bottom:10px;">

  <button onclick="getWeather()" 
          style="width:100%;padding:10px;border:none;border-radius:8px;background:#007bff;color:white;font-weight:bold;">
    Check Weather
  </button>

  <div id="result" style="margin-top:15px;"></div>
</div>

<script>
  const API_KEY = "8d79169849fd362c941b4a5686ea40f8"; // Replace with your actual key

  async function getWeather() {
    const city = document.getElementById("city-input").value;
    const result = document.getElementById("result");

    if (!city) {
      result.innerHTML = "<p>Please enter a city.</p>";
      return;
    }

    result.innerHTML = "<p>Loading...</p>";

    try {
      const response = await fetch(
        `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
      );

      const data = await response.json();

      if (data.cod !== 200) {
        result.innerHTML = "<p>City not found.</p>";
        return;
      }

      const weather = data.weather[0].description;
      const temp = data.main.temp;
      const feels = data.main.feels_like;
      const humidity = data.main.humidity;
      const wind = data.wind.speed;

      result.innerHTML = `
        <div style="background:white;padding:15px;border-radius:10px;box-shadow:0 3px 6px rgba(0,0,0,0.1);">
          <h4 style="margin:0 0 10px 0;">📍 ${city.toUpperCase()}</h4>
          <p><strong>🌡️ Temperature:</strong> ${temp}°C</p>
          <p><strong>🤔 Feels Like:</strong> ${feels}°C</p>
          <p><strong>☁️ Condition:</strong> ${weather}</p>
          <p><strong>💧 Humidity:</strong> ${humidity}%</p>
          <p><strong>💨 Wind Speed:</strong> ${wind} m/s</p>
        </div>
      `;
    } catch (error) {
      result.innerHTML = "<p>Error retrieving weather data.</p>";
    }
  }
</script>
</div>
</section>

</body>
